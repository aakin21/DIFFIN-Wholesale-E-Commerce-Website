<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DIFFIN - Toptan tekstil ürünleri, sweat, tişört ve daha fazlası. Kaliteli üretim, uygun fiyatlar." />
    <meta name="keywords" content="toptan tekstil, sweat, tişört, giyim üretimi, DIFFIN" />
    <title>DIFFIN - Toptan Tekstil</title>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #initial-loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader .logo {
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.4em;
        color: #000;
        margin-bottom: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #initial-loader .spinner {
        width: 36px;
        height: 36px;
        border: 1.5px solid #e5e7eb;
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="logo">DIFFIN</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // React mount olunca loader'ı gizle
      window.__hideLoader = function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hide');
          setTimeout(function() { loader.remove(); }, 400);
        }
      };
    </script>
  </body>
</html>
